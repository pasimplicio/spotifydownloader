<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Spotify Downloader - YouTube</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: #fff;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding: 20px;
            background: rgba(30, 41, 59, 0.95);
            border-radius: 16px;
            border: 1px solid #334155;
        }

        h1 {
            font-size: 1.8rem;
            background: linear-gradient(135deg, #ff0000, #ff4444);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-links a {
            color: #94a3b8;
            text-decoration: none;
            margin-left: 20px;
            padding: 8px 16px;
            border-radius: 8px;
        }

        .nav-links a:hover {
            background: #334155;
        }

        .main-card {
            background: #1e293b;
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 30px;
            border: 1px solid #334155;
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin: 20px 0;
        }

        input {
            flex: 1;
            padding: 15px;
            border-radius: 12px;
            border: 2px solid #334155;
            background: #0f172a;
            color: #fff;
            font-size: 16px;
        }

        input:focus {
            outline: none;
            border-color: #ff4444;
        }

        button {
            padding: 15px 30px;
            background: linear-gradient(135deg, #ff0000, #ff4444);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -10px #ff0000;
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .progress {
            margin-top: 20px;
            padding: 20px;
            background: #0f172a;
            border-radius: 12px;
            display: none;
        }

        .progress.active {
            display: block;
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: #334155;
            border-radius: 3px;
            margin: 15px 0;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #ff0000, #ff4444);
            transition: width 0.3s;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.7; }
            100% { opacity: 1; }
        }

        .downloads-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .download-item {
            background: #0f172a;
            border-radius: 12px;
            padding: 15px;
            border: 1px solid #334155;
        }

        .download-item h4 {
            font-size: 14px;
            margin-bottom: 8px;
            color: #fff;
        }

        .download-item .size {
            color: #94a3b8;
            font-size: 12px;
            margin-bottom: 12px;
        }

        .download-item a {
            display: inline-block;
            padding: 6px 12px;
            background: #ff4444;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            font-size: 12px;
        }

        .stats {
            display: flex;
            gap: 20px;
            margin-top: 20px;
            padding: 15px;
            background: #0f172a;
            border-radius: 12px;
        }

        .stat-item {
            flex: 1;
            text-align: center;
        }

        .stat-value {
            font-size: 24px;
            font-weight: bold;
            color: #ff4444;
        }

        .stat-label {
            color: #94a3b8;
            font-size: 12px;
        }

        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 15px 25px;
            background: #1e293b;
            border-left: 4px solid #ff4444;
            border-radius: 8px;
            color: #fff;
            animation: slideIn 0.3s;
            z-index: 1000;
        }

        .toast.success {
            border-left-color: #22c55e;
        }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .info {
            background: #0f172a;
            border-left: 4px solid #ff4444;
            padding: 15px;
            border-radius: 8px;
            margin: 20px 0;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .button-group button {
            flex: 1;
        }

        .button-group button.secondary {
            background: #334155;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🎵 Download via YouTube</h1>
            <div class="nav-links">
                <a href="/">Preview</a>
                <a href="/download-completo" class="active">Download</a>
            </div>
        </header>

        <div class="main-card">
            <div class="info">
                <strong>✅ Funcionando 100%!</strong><br>
                Download via YouTube com nome correto do artista e música.
            </div>

            <div class="input-group">
                <input type="text" id="url" placeholder="Cole o link do Spotify" value="https://open.spotify.com/track/6i4Qi1mJxXjqNIL9HFJhRs">
                <button onclick="downloadMusic()" id="downloadBtn">Baixar</button>
            </div>

            <div class="progress" id="progress">
                <div id="status">Preparando download...</div>
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <div id="details" style="color: #94a3b8; font-size: 14px;"></div>
            </div>

            <div class="button-group">
                <button class="secondary" onclick="refreshList()">🔄 Atualizar</button>
                <button class="secondary" onclick="openFolder()">📁 Abrir Pasta</button>
                <button class="secondary" onclick="clearCache()">🗑️ Limpar Cache</button>
            </div>

            <h3 style="margin: 20px 0 10px;">📥 Baixados</h3>
            <div id="downloadsList" class="downloads-list"></div>

            <div class="stats" id="stats">
                <div class="stat-item">
                    <div class="stat-value" id="statCount">0</div>
                    <div class="stat-label">Músicas</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="statSize">0 MB</div>
                    <div class="stat-label">Espaço</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        async function downloadMusic() {
            const url = document.getElementById('url').value.trim();
            if (!url) {
                showToast('Cole uma URL', true);
                return;
            }

            const btn = document.getElementById('downloadBtn');
            const progress = document.getElementById('progress');
            const progressFill = document.getElementById('progressFill');
            const status = document.getElementById('status');
            const details = document.getElementById('details');

            btn.disabled = true;
            progress.classList.add('active');
            progressFill.style.width = '10%';
            status.textContent = 'Processando...';

            try {
                const response = await fetch('/download-completo/download', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({url})
                });

                const result = await response.json();

                if (result.success) {
                    progressFill.style.width = '100%';
                    status.textContent = '✅ Download concluído!';
                    details.textContent = result.filename;
                    showToast(`Download concluído: ${result.filename}`, false, 'success');
                    refreshList();
                } else {
                    progress.classList.remove('active');
                    showToast(`Erro: ${result.error}`, true);
                }
            } catch (error) {
                progress.classList.remove('active');
                showToast('Erro de conexão', true);
            }

            btn.disabled = false;
            setTimeout(() => progress.classList.remove('active'), 3000);
        }

        async function refreshList() {
            try {
                const response = await fetch('/download-completo/list');
                const downloads = await response.json();

                const list = document.getElementById('downloadsList');
                if (downloads.length === 0) {
                    list.innerHTML = '<p style="color: #94a3b8;">Nenhum download</p>';
                } else {
                    list.innerHTML = downloads.map(f => `
                        <div class="download-item">
                            <h4>${f.name}</h4>
                            <div class="size">${f.size_mb.toFixed(2)} MB</div>
                            <div style="color: #94a3b8; font-size: 11px; margin-bottom: 10px;">${f.modified_str}</div>
                            <a href="/download-completo/file/${f.name}" download>⬇️ Download</a>
                        </div>
                    `).join('');
                }

                // Atualiza stats
                const totalMB = downloads.reduce((acc, f) => acc + f.size_mb, 0);
                document.getElementById('statCount').textContent = downloads.length;
                document.getElementById('statSize').textContent = totalMB.toFixed(1) + ' MB';

            } catch (error) {
                console.error('Erro ao atualizar lista');
            }
        }

        async function openFolder() {
            await fetch('/download-completo/folder');
        }

        async function clearCache() {
            if (confirm('Limpar cache de metadados?')) {
                await fetch('/download-completo/clear-cache', {method: 'POST'});
                showToast('Cache limpo');
            }
        }

        function showToast(message, isError = false, type = '') {
            const toast = document.createElement('div');
            toast.className = 'toast' + (isError ? '' : ' success');
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        // Atualiza a cada 10 segundos
        refreshList();
        setInterval(refreshList, 10000);
    </script>
</body>
</html>
